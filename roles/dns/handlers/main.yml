---
# handlers file for DNS

- name: Restart NetworkManager
  become: true
  ansible.builtin.systemd_service:
    name: NetworkManager
    state: restarted
    daemon_reload: true

- name: Restart systemd-resolved (Debian)
  become: true
  ansible.builtin.systemd:
    state: restarted
    daemon_reload: true
    name: systemd-resolved